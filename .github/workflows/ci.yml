name: CI
on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        working-directory: backend
        run: ./mvnw --batch-mode verify

      - name: Check formatting
        working-directory: backend
        run: ./mvnw --batch-mode spotless:check